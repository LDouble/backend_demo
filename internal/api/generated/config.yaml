# yaml-language-server: $schema=https://raw.githubusercontent.com/oapi-codegen/oapi-codegen/v2.8.0/configuration-schema.json
package: generated
generate:
  models: true
  gin-server: true
  embedded-spec: true
output: api.gen.go
output-options:
  skip-prune: false
  name-normalizer: ToCamelCaseWithInitialisms
  additional-initialisms:
    - ID
    - URL
    - HTTP
    - JSON
