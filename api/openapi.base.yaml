# Source contract for core APIs and shared components.
# api/openapi.yaml is generated from this file and module schemas.
openapi: 3.0.3
info:
  title: Campus Platform API
  version: 1.1.0
servers:
  - url: http://localhost:8080
paths:
  /health/live:
    get:
      operationId: Live
      responses: {"200": {$ref: "#/components/responses/Success"}}
  /health/ready:
    get:
      operationId: Ready
      responses: {"200": {$ref: "#/components/responses/Success"}, "503": {$ref: "#/components/responses/Error"}}
  /api/v1/auth/login:
    post:
      operationId: Login
      requestBody: {$ref: "#/components/requestBodies/Login"}
      responses: {"200": {$ref: "#/components/responses/TokenPairResponse"}, "401": {$ref: "#/components/responses/Error"}}
  /api/v1/auth/refresh:
    post:
      operationId: Refresh
      requestBody: {$ref: "#/components/requestBodies/Refresh"}
      responses: {"200": {$ref: "#/components/responses/TokenPairResponse"}, "401": {$ref: "#/components/responses/Error"}}
  /api/v1/auth/logout:
    post:
      operationId: Logout
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/LogoutResponse"}, "401": {$ref: "#/components/responses/Error"}}
  /api/v1/auth/me:
    get:
      operationId: GetMe
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/CurrentUserResponse"}}
  /api/v1/auth/me/password:
    patch:
      operationId: ChangeMyPassword
      x-academic-verification: none
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/ChangeMyPasswordRequest"}}}
      responses: {"200": {$ref: "#/components/responses/Success"}, "401": {$ref: "#/components/responses/Error"}}
  /api/v1/permissions:
    get:
      operationId: ListPermissionCatalog
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/PermissionCatalogResponse"}, "403": {$ref: "#/components/responses/Error"}}
  /api/v1/users:
    get:
      operationId: ListUsers
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/Page"}, {$ref: "#/components/parameters/PageSize"}]
      responses: {"200": {$ref: "#/components/responses/UserPageResponse"}}
    post:
      operationId: CreateUser
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody: {$ref: "#/components/requestBodies/CreateUser"}
      responses: {"201": {$ref: "#/components/responses/UserResponse"}}
  /api/v1/users/{id}:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      operationId: GetUser
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/UserResponse"}}
    patch:
      operationId: UpdateUser
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody: {$ref: "#/components/requestBodies/UpdateUser"}
      responses: {"200": {$ref: "#/components/responses/UserResponse"}}
  /api/v1/users/{id}/status:
    parameters: [{$ref: "#/components/parameters/ID"}]
    patch:
      operationId: SetUserStatus
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/UserStatusRequest"}}}
      responses: {"200": {$ref: "#/components/responses/UserResponse"}}
  /api/v1/users/{id}/roles:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      operationId: GetUserRoles
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/UserRolesResponse"}}
    put:
      operationId: SetUserRoles
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/UserRolesRequest"}}}
      responses: {"200": {$ref: "#/components/responses/UserRolesResponse"}}
  /api/v1/roles:
    get:
      operationId: ListRoles
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/Page"}, {$ref: "#/components/parameters/PageSize"}]
      responses: {"200": {$ref: "#/components/responses/RolePageResponse"}}
    post:
      operationId: CreateRole
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/CreateRoleRequest"}}}
      responses: {"201": {$ref: "#/components/responses/RoleResponse"}}
  /api/v1/roles/{id}:
    parameters: [{$ref: "#/components/parameters/ID"}]
    patch:
      operationId: UpdateRole
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/UpdateRoleRequest"}}}
      responses: {"200": {$ref: "#/components/responses/RoleResponse"}}
    delete:
      operationId: DeleteRole
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      responses: {"200": {$ref: "#/components/responses/DeleteResultResponse"}}
  /api/v1/roles/{id}/permissions:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      operationId: GetPermissions
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/RolePermissionsResponse"}}
    put:
      operationId: SetPermissions
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/PermissionsRequest"}}}
      responses: {"200": {$ref: "#/components/responses/RolePermissionsResponse"}}
  /api/v1/configs:
    get:
      operationId: ListConfigs
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/Page"}, {$ref: "#/components/parameters/PageSize"}, {$ref: "#/components/parameters/Group"}, {$ref: "#/components/parameters/Keyword"}, {$ref: "#/components/parameters/ConfigFormatQuery"}, {$ref: "#/components/parameters/ConfigVisibilityQuery"}]
      responses: {"200": {$ref: "#/components/responses/ConfigPageResponse"}}
    post:
      operationId: CreateConfig
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/CreateConfigRequest"}}}
      responses: {"201": {$ref: "#/components/responses/ConfigResponse"}}
  /api/v1/configs/{id}:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      operationId: GetConfig
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/ConfigResponse"}}
    put:
      operationId: UpdateConfig
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/UpdateConfigRequest"}}}
      responses: {"200": {$ref: "#/components/responses/ConfigResponse"}, "409": {$ref: "#/components/responses/Error"}}
    delete:
      operationId: DeleteConfig
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}, {$ref: "#/components/parameters/ExpectedVersion"}]
      responses: {"200": {$ref: "#/components/responses/DeleteResultResponse"}, "409": {$ref: "#/components/responses/Error"}}
  /api/v1/runtime-configs/{group}/{key}:
    get:
      operationId: GetRuntimeConfig
      parameters:
        - {name: group, in: path, required: true, schema: {type: string, minLength: 1, maxLength: 64}}
        - {name: key, in: path, required: true, schema: {type: string, minLength: 1, maxLength: 128}}
      responses: {"200": {$ref: "#/components/responses/RuntimeConfigResponse"}, "304": {description: Not modified}, "404": {$ref: "#/components/responses/Error"}}
components:
  securitySchemes:
    bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT}
  parameters:
    ID: {name: id, in: path, required: true, schema: {type: integer, format: uint64, minimum: 1}}
    IdempotencyKey: {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 1, maxLength: 128}}
    Page: {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
    PageSize: {name: page_size, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
    Group: {name: group, in: query, schema: {type: string, maxLength: 64}}
    Keyword: {name: keyword, in: query, schema: {type: string, maxLength: 128}}
    ConfigFormatQuery: {name: format, in: query, schema: {type: string, enum: [string, json]}}
    ConfigVisibilityQuery: {name: visibility, in: query, schema: {type: string, enum: [admin, public]}}
    ExpectedVersion: {name: expected_version, in: query, required: true, schema: {type: integer, format: uint64, minimum: 1}}
  requestBodies:
    Login: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/LoginRequest"}}}}
    Refresh: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/RefreshRequest"}}}}
    CreateUser: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/CreateUserRequest"}}}}
    UpdateUser: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/UpdateUserRequest"}}}}
  responses:
    Success:
      description: Successful response
      content: {application/json: {schema: {$ref: "#/components/schemas/SuccessEnvelope"}}}
    TokenPairResponse:
      description: Authentication tokens
      content: {application/json: {schema: {$ref: "#/components/schemas/TokenPairEnvelope"}}}
    LogoutResponse:
      description: Session logged out
      content: {application/json: {schema: {$ref: "#/components/schemas/LogoutEnvelope"}}}
    CurrentUserResponse:
      description: Current authenticated user and effective access
      content: {application/json: {schema: {$ref: "#/components/schemas/CurrentUserEnvelope"}}}
    UserResponse:
      description: User response
      content: {application/json: {schema: {$ref: "#/components/schemas/UserEnvelope"}}}
    UserPageResponse:
      description: User page
      content: {application/json: {schema: {$ref: "#/components/schemas/UserPageEnvelope"}}}
    UserRolesResponse:
      description: Direct user roles
      content: {application/json: {schema: {$ref: "#/components/schemas/UserRolesEnvelope"}}}
    RoleResponse:
      description: Role response
      content: {application/json: {schema: {$ref: "#/components/schemas/RoleEnvelope"}}}
    RolePageResponse:
      description: Role page
      content: {application/json: {schema: {$ref: "#/components/schemas/RolePageEnvelope"}}}
    RolePermissionsResponse:
      description: Role permissions
      content: {application/json: {schema: {$ref: "#/components/schemas/RolePermissionsEnvelope"}}}
    PermissionCatalogResponse:
      description: Generated permission directory
      content: {application/json: {schema: {$ref: "#/components/schemas/PermissionCatalogEnvelope"}}}
    DeleteResultResponse:
      description: Deletion result
      content: {application/json: {schema: {$ref: "#/components/schemas/DeleteResultEnvelope"}}}
    ConfigResponse:
      description: Configuration value
      content: {application/json: {schema: {$ref: "#/components/schemas/ConfigEnvelope"}}}
    ConfigPageResponse:
      description: Configuration page
      content: {application/json: {schema: {$ref: "#/components/schemas/ConfigPageEnvelope"}}}
    RuntimeConfigResponse:
      description: Public runtime JSON configuration
      content: {application/json: {schema: {$ref: "#/components/schemas/RuntimeConfigEnvelope"}}}
    NoticeResponse:
      description: Notice
      content: {application/json: {schema: {$ref: "#/components/schemas/NoticeEnvelope"}}}
    NoticePageResponse:
      description: Notice page
      content: {application/json: {schema: {$ref: "#/components/schemas/NoticePageEnvelope"}}}
    AdminNoticeResponse:
      description: Notice detail with audience
      content: {application/json: {schema: {$ref: "#/components/schemas/AdminNoticeEnvelope"}}}
    NoticeDeliveryPageResponse:
      description: Notice delivery page
      content: {application/json: {schema: {$ref: "#/components/schemas/NoticeDeliveryPageEnvelope"}}}
    RetryNoticeResponse:
      description: Retry result
      content: {application/json: {schema: {$ref: "#/components/schemas/RetryNoticeEnvelope"}}}
    UnreadCountResponse:
      description: Unread notice count
      content: {application/json: {schema: {$ref: "#/components/schemas/UnreadCountEnvelope"}}}
    UpdatedCountResponse:
      description: Updated notice count
      content: {application/json: {schema: {$ref: "#/components/schemas/UpdatedCountEnvelope"}}}
    ReadResultResponse:
      description: Read result
      content: {application/json: {schema: {$ref: "#/components/schemas/ReadResultEnvelope"}}}
    Error:
      description: Error response
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorEnvelope"}}}
  schemas:
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: {type: string}
        refresh_token: {type: string}
        token_type: {type: string, enum: [Bearer]}
        expires_in: {type: integer, format: int64, minimum: 1}
    User:
      type: object
      required: [id, username, status, created_at, updated_at]
      properties:
        id: {type: integer, format: uint64, minimum: 1}
        username: {type: string}
        status: {type: string, enum: [active, disabled]}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    Role:
      type: object
      required: [id, name, description, builtin, created_at, updated_at]
      properties:
        id: {type: integer, format: uint64, minimum: 1}
        name: {type: string}
        description: {type: string}
        builtin: {type: boolean}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    PermissionCatalogEntry:
      type: object
      required: [code, module, path_pattern, methods]
      properties:
        code: {type: string}
        module: {type: string}
        path_pattern: {type: string}
        methods:
          type: array
          items: {type: string, enum: [GET, POST, PUT, PATCH, DELETE]}
    CurrentUser:
      type: object
      required: [user, roles, permissions]
      properties:
        user: {$ref: "#/components/schemas/User"}
        roles: {type: array, items: {type: string}}
        permissions: {type: array, items: {type: string}}
    UserPage:
      type: object
      required: [items, page, page_size, total]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/User"}}
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1, maximum: 100}
        total: {type: integer, format: int64, minimum: 0}
    RolePage:
      type: object
      required: [items, page, page_size, total]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/Role"}}
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1, maximum: 100}
        total: {type: integer, format: int64, minimum: 0}
    UserRoles:
      type: object
      required: [roles]
      properties: {roles: {type: array, items: {type: string}}}
    RolePermissions:
      type: object
      required: [permissions]
      properties: {permissions: {type: array, items: {$ref: "#/components/schemas/Permission"}}}
    PermissionCatalog:
      type: object
      required: [permissions]
      properties: {permissions: {type: array, items: {$ref: "#/components/schemas/PermissionCatalogEntry"}}}
    DeleteResult:
      type: object
      required: [deleted]
      properties: {deleted: {type: boolean}}
    LogoutResult:
      type: object
      required: [logged_out]
      properties: {logged_out: {type: boolean}}
    LoginRequest:
      type: object
      required: [username, password]
      properties: {username: {type: string, minLength: 3, maxLength: 32}, password: {type: string, minLength: 12}}
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties: {refresh_token: {type: string}}
    CreateUserRequest:
      type: object
      required: [username, password]
      properties: {username: {type: string, minLength: 3, maxLength: 32}, password: {type: string, minLength: 12}}
    UpdateUserRequest:
      type: object
      properties: {username: {type: string, minLength: 3, maxLength: 32}, password: {type: string, minLength: 12}}
    ChangeMyPasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: {type: string, minLength: 1, maxLength: 256}
        new_password: {type: string, minLength: 12, maxLength: 256}
    UserStatusRequest:
      type: object
      required: [status]
      properties: {status: {type: string, enum: [active, disabled]}}
    UserRolesRequest:
      type: object
      required: [roles]
      properties: {roles: {type: array, items: {type: string}}}
    CreateRoleRequest:
      type: object
      required: [name]
      properties: {name: {type: string}, description: {type: string}}
    UpdateRoleRequest:
      type: object
      required: [description]
      properties: {description: {type: string}}
    Permission:
      type: object
      required: [path_pattern, methods]
      properties: {path_pattern: {type: string}, methods: {type: array, items: {type: string}}}
    PermissionsRequest:
      type: object
      required: [permissions]
      properties: {permissions: {type: array, items: {$ref: "#/components/schemas/Permission"}}}
    CreateConfigRequest:
      type: object
      required: [group, key, value]
      properties:
        group: {type: string, maxLength: 64}
        key: {type: string, maxLength: 128}
        value: {type: string}
        format: {type: string, enum: [string, json], default: string}
        visibility: {type: string, enum: [admin, public], default: admin}
        encrypted: {type: boolean, default: false}
    UpdateConfigRequest:
      type: object
      required: [expected_version]
      properties:
        expected_version: {type: integer, format: uint64, minimum: 1}
        value: {type: string}
        visibility: {type: string, enum: [admin, public]}
    NoticeAudience:
      type: object
      required: [all, roles, user_ids]
      properties:
        all: {type: boolean}
        roles: {type: array, items: {type: string}}
        user_ids: {type: array, items: {type: integer, format: uint64, minimum: 1}}
    CreateNoticeRequest:
      type: object
      required: [title, summary, body, category, priority, channels, audience]
      properties:
        title: {type: string, minLength: 1, maxLength: 200}
        summary: {type: string, maxLength: 500}
        body: {type: string, minLength: 1, maxLength: 20000}
        category: {type: string, pattern: "^[a-z][a-z0-9-]{0,63}$"}
        priority: {type: string, enum: [normal, important, urgent]}
        action_path: {type: string, maxLength: 512}
        channels: {type: array, minItems: 1, items: {type: string, enum: [in_app, push]}}
        audience: {$ref: "#/components/schemas/NoticeAudience"}
    UpdateNoticeRequest:
      allOf:
        - {$ref: "#/components/schemas/CreateNoticeRequest"}
        - type: object
          required: [expected_version]
          properties: {expected_version: {type: integer, format: uint64, minimum: 1}}
    PublishNoticeRequest:
      type: object
      required: [expected_version]
      properties:
        expected_version: {type: integer, format: uint64, minimum: 1}
        publish_at: {type: string, format: date-time}
    VersionRequest:
      type: object
      required: [expected_version]
      properties: {expected_version: {type: integer, format: uint64, minimum: 1}}
    SuccessEnvelope:
      type: object
      required: [data, request_id]
      properties: {data: {}, request_id: {type: string}}
    Config:
      type: object
      required: [id, group, key, value, encrypted, format, visibility, has_value, version, updated_by, created_at, updated_at]
      properties:
        id: {type: integer, format: uint64}
        group: {type: string}
        key: {type: string}
        value: {type: string, nullable: true}
        encrypted: {type: boolean}
        format: {type: string, enum: [string, json]}
        visibility: {type: string, enum: [admin, public]}
        has_value: {type: boolean}
        version: {type: integer, format: uint64}
        updated_by: {type: integer, format: uint64}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    ConfigPage:
      type: object
      required: [items, page, page_size, total]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/Config"}}
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1, maximum: 100}
        total: {type: integer, format: int64}
    RuntimeConfig:
      type: object
      required: [group, key, value, version, updated_at]
      properties:
        group: {type: string}
        key: {type: string}
        value: {}
        version: {type: integer, format: uint64}
        updated_at: {type: string, format: date-time}
    Notice:
      type: object
      required: [id, title, summary, body, category, priority, status, action_path, channels, version, created_by, updated_by, created_at, updated_at]
      properties:
        id: {type: integer, format: uint64}
        title: {type: string}
        summary: {type: string}
        body: {type: string}
        category: {type: string}
        priority: {type: string, enum: [normal, important, urgent]}
        status: {type: string, enum: [draft, scheduled, publishing, published, revoked]}
        action_path: {type: string}
        channels: {type: array, items: {type: string, enum: [in_app, push]}}
        publish_at: {type: string, format: date-time, nullable: true}
        published_at: {type: string, format: date-time, nullable: true}
        revoked_at: {type: string, format: date-time, nullable: true}
        version: {type: integer, format: uint64}
        created_by: {type: integer, format: uint64}
        updated_by: {type: integer, format: uint64}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    NoticePage:
      type: object
      required: [items, page, page_size, total]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/Notice"}}
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1, maximum: 100}
        total: {type: integer, format: int64}
    AdminNotice:
      type: object
      required: [notice, audience]
      properties:
        notice: {$ref: "#/components/schemas/Notice"}
        audience: {$ref: "#/components/schemas/NoticeAudience"}
    NoticeDelivery:
      type: object
      required: [id, notice_id, user_id, channel, status, attempts, created_at, updated_at]
      properties:
        id: {type: integer, format: uint64}
        notice_id: {type: integer, format: uint64}
        user_id: {type: integer, format: uint64}
        channel: {type: string}
        status: {type: string}
        attempts: {type: integer, format: int64}
        provider_message_id: {type: string}
        last_error: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    NoticeDeliveryPage:
      type: object
      required: [items, page, page_size, total]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/NoticeDelivery"}}
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1, maximum: 100}
        total: {type: integer, format: int64}
    RetryNotice: {type: object, required: [retried], properties: {retried: {type: integer, format: int64}}}
    UnreadCount: {type: object, required: [count], properties: {count: {type: integer, format: int64}}}
    UpdatedCount: {type: object, required: [updated], properties: {updated: {type: integer, format: int64}}}
    ReadResult: {type: object, required: [read], properties: {read: {type: boolean}}}
    TokenPairEnvelope:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/TokenPair"}, request_id: {type: string}}
    LogoutEnvelope:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/LogoutResult"}, request_id: {type: string}}
    CurrentUserEnvelope:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/CurrentUser"}, request_id: {type: string}}
    UserEnvelope:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/User"}, request_id: {type: string}}
    UserPageEnvelope:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/UserPage"}, request_id: {type: string}}
    UserRolesEnvelope:
      type: object
      required: [data, request_id]
