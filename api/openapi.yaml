openapi: 3.0.3
info:
  title: Campus Platform API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /health/live:
    get:
      operationId: Live
      responses: {"200": {$ref: "#/components/responses/Success"}}
  /health/ready:
    get:
      operationId: Ready
      responses: {"200": {$ref: "#/components/responses/Success"}, "503": {$ref: "#/components/responses/Error"}}
  /api/v1/auth/login:
    post:
      operationId: Login
      requestBody: {$ref: "#/components/requestBodies/Login"}
      responses: {"200": {$ref: "#/components/responses/Success"}, "401": {$ref: "#/components/responses/Error"}}
  /api/v1/auth/refresh:
    post:
      operationId: Refresh
      requestBody: {$ref: "#/components/requestBodies/Refresh"}
      responses: {"200": {$ref: "#/components/responses/Success"}, "401": {$ref: "#/components/responses/Error"}}
  /api/v1/auth/logout:
    post:
      operationId: Logout
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/Success"}, "401": {$ref: "#/components/responses/Error"}}
  /api/v1/auth/me:
    get:
      operationId: GetMe
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/Success"}}
  /api/v1/users:
    get:
      operationId: ListUsers
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/Page"}, {$ref: "#/components/parameters/PageSize"}]
      responses: {"200": {$ref: "#/components/responses/Success"}}
    post:
      operationId: CreateUser
      security: [{bearerAuth: []}]
      requestBody: {$ref: "#/components/requestBodies/CreateUser"}
      responses: {"201": {$ref: "#/components/responses/Success"}}
  /api/v1/users/{id}:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      operationId: GetUser
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/Success"}}
    patch:
      operationId: UpdateUser
      security: [{bearerAuth: []}]
      requestBody: {$ref: "#/components/requestBodies/UpdateUser"}
      responses: {"200": {$ref: "#/components/responses/Success"}}
  /api/v1/users/{id}/status:
    parameters: [{$ref: "#/components/parameters/ID"}]
    patch:
      operationId: SetUserStatus
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/UserStatusRequest"}}}
      responses: {"200": {$ref: "#/components/responses/Success"}}
  /api/v1/users/{id}/roles:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      operationId: GetUserRoles
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/Success"}}
    put:
      operationId: SetUserRoles
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/UserRolesRequest"}}}
      responses: {"200": {$ref: "#/components/responses/Success"}}
  /api/v1/roles:
    get:
      operationId: ListRoles
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/Page"}, {$ref: "#/components/parameters/PageSize"}]
      responses: {"200": {$ref: "#/components/responses/Success"}}
    post:
      operationId: CreateRole
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/CreateRoleRequest"}}}
      responses: {"201": {$ref: "#/components/responses/Success"}}
  /api/v1/roles/{id}:
    parameters: [{$ref: "#/components/parameters/ID"}]
    patch:
      operationId: UpdateRole
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/UpdateRoleRequest"}}}
      responses: {"200": {$ref: "#/components/responses/Success"}}
    delete:
      operationId: DeleteRole
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/Success"}}
  /api/v1/roles/{id}/permissions:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      operationId: GetPermissions
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/Success"}}
    put:
      operationId: SetPermissions
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/PermissionsRequest"}}}
      responses: {"200": {$ref: "#/components/responses/Success"}}
  /api/v1/configs:
    get:
      operationId: ListConfigs
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/Page"}, {$ref: "#/components/parameters/PageSize"}, {$ref: "#/components/parameters/Group"}]
      responses: {"200": {$ref: "#/components/responses/Success"}}
    post:
      operationId: CreateConfig
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/CreateConfigRequest"}}}
      responses: {"201": {$ref: "#/components/responses/Success"}}
  /api/v1/configs/{id}:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      operationId: GetConfig
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/Success"}}
    put:
      operationId: UpdateConfig
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: "#/components/schemas/UpdateConfigRequest"}}}
      responses: {"200": {$ref: "#/components/responses/Success"}, "409": {$ref: "#/components/responses/Error"}}
    delete:
      operationId: DeleteConfig
      security: [{bearerAuth: []}]
      responses: {"200": {$ref: "#/components/responses/Success"}}
components:
  securitySchemes:
    bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT}
  parameters:
    ID: {name: id, in: path, required: true, schema: {type: integer, format: uint64, minimum: 1}}
    Page: {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
    PageSize: {name: page_size, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
    Group: {name: group, in: query, schema: {type: string, maxLength: 64}}
  requestBodies:
    Login: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/LoginRequest"}}}}
    Refresh: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/RefreshRequest"}}}}
    CreateUser: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/CreateUserRequest"}}}}
    UpdateUser: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/UpdateUserRequest"}}}}
  responses:
    Success:
      description: Successful response
      content: {application/json: {schema: {$ref: "#/components/schemas/SuccessEnvelope"}}}
    Error:
      description: Error response
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorEnvelope"}}}
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties: {username: {type: string, minLength: 3, maxLength: 32}, password: {type: string, minLength: 12}}
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties: {refresh_token: {type: string}}
    CreateUserRequest:
      type: object
      required: [username, password]
      properties: {username: {type: string, minLength: 3, maxLength: 32}, password: {type: string, minLength: 12}}
    UpdateUserRequest:
      type: object
      properties: {username: {type: string, minLength: 3, maxLength: 32}, password: {type: string, minLength: 12}}
    UserStatusRequest:
      type: object
      required: [status]
      properties: {status: {type: string, enum: [active, disabled]}}
    UserRolesRequest:
      type: object
      required: [roles]
      properties: {roles: {type: array, items: {type: string}}}
    CreateRoleRequest:
      type: object
      required: [name]
      properties: {name: {type: string}, description: {type: string}}
    UpdateRoleRequest:
      type: object
      required: [description]
      properties: {description: {type: string}}
    Permission:
      type: object
      required: [path_pattern, methods]
      properties: {path_pattern: {type: string}, methods: {type: array, items: {type: string}}}
    PermissionsRequest:
      type: object
      required: [permissions]
      properties: {permissions: {type: array, items: {$ref: "#/components/schemas/Permission"}}}
    CreateConfigRequest:
      type: object
      required: [group, key, value]
      properties: {group: {type: string}, key: {type: string}, value: {type: string}, encrypted: {type: boolean, default: false}}
    UpdateConfigRequest:
      type: object
      required: [expected_version]
      properties: {expected_version: {type: integer, format: uint64, minimum: 1}, value: {type: string}}
    SuccessEnvelope:
      type: object
      required: [data, request_id]
      properties: {data: {}, request_id: {type: string}}
    ErrorEnvelope:
      type: object
      required: [error, request_id]
      properties:
        error:
          type: object
          required: [code, message]
          properties: {code: {type: string}, message: {type: string}}
        request_id: {type: string}
