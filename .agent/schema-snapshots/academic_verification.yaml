version: 2
module: academic_verification
entity:
    name: AcademicIdentity
    table: academic_identities
    primary: true
    fields:
        - name: user_id
          type: uint64
          required: true
          unique: true
        - name: student_no
          type: string
          required: true
          size: 64
          unique: true
        - name: real_name
          type: string
          required: true
          size: 100
        - name: method
          type: string
          required: true
          size: 24
        - name: status
          type: string
          required: true
          size: 24
          index: true
        - name: verified_at
          type: datetime
          required: true
        - name: revoked_at
          type: datetime
          required: false
        - name: revoke_reason
          type: string
          required: false
          size: 500
        - name: version
          type: uint64
          required: true
    indexes:
        - name: uk_academic_identity_user
          fields:
            - user_id
          unique: true
        - name: uk_academic_identity_student_no
          fields:
            - student_no
          unique: true
entities:
    - name: AcademicIdentity
      table: academic_identities
      primary: true
      fields:
        - name: user_id
          type: uint64
          required: true
          unique: true
        - name: student_no
          type: string
          required: true
          size: 64
          unique: true
        - name: real_name
          type: string
          required: true
          size: 100
        - name: method
          type: string
          required: true
          size: 24
        - name: status
          type: string
          required: true
          size: 24
          index: true
        - name: verified_at
          type: datetime
          required: true
        - name: revoked_at
          type: datetime
          required: false
        - name: revoke_reason
          type: string
          required: false
          size: 500
        - name: version
          type: uint64
          required: true
      indexes:
        - name: uk_academic_identity_user
          fields:
            - user_id
          unique: true
        - name: uk_academic_identity_student_no
          fields:
            - student_no
          unique: true
    - name: AcademicVerificationMaterial
      table: academic_verification_materials
      fields:
        - name: user_id
          type: uint64
          required: true
          index: true
        - name: storage_key
          type: string
          required: true
          size: 128
          unique: true
        - name: mime_type
          type: string
          required: true
          size: 32
        - name: size_bytes
          type: int64
          required: true
        - name: sha256
          type: string
          required: true
          size: 64
          index: true
        - name: status
          type: string
          required: true
          size: 24
          index: true
        - name: bound_request_id
          type: uint64
          required: false
        - name: expires_at
          type: datetime
          required: true
          index: true
        - name: delete_after
          type: datetime
          required: false
          index: true
        - name: deleted_at
          type: datetime
          required: false
        - name: version
          type: uint64
          required: true
      indexes:
        - name: uk_academic_material_storage_key
          fields:
            - storage_key
          unique: true
        - name: idx_academic_material_cleanup
          fields:
            - status
            - expires_at
            - delete_after
    - name: AcademicVerificationRequest
      table: academic_verification_requests
      fields:
        - name: user_id
          type: uint64
          required: true
          index: true
        - name: student_no
          type: string
          required: true
          size: 64
          index: true
        - name: real_name
          type: string
          required: true
          size: 100
        - name: method
          type: string
          required: true
          size: 24
        - name: material_id
          type: uint64
          required: false
        - name: status
          type: string
          required: true
          size: 24
          index: true
        - name: review_reason
          type: string
          required: false
          size: 500
        - name: reviewed_by
          type: uint64
          required: false
        - name: reviewed_at
          type: datetime
          required: false
        - name: version
          type: uint64
          required: true
      indexes:
        - name: idx_academic_request_review
          fields:
            - status
            - user_id
crud:
    - create
    - get
    - list
    - update
permissions:
    - name: academic_verification:admin_approve
      path: /api/v1/admin/academic-verification/requests/:id/approve
      methods:
        - POST
    - name: academic_verification:admin_list
      path: /api/v1/admin/academic-verification/requests
      methods:
        - GET
    - name: academic_verification:admin_material
      path: /api/v1/admin/academic-verification/materials/:id
      methods:
        - GET
    - name: academic_verification:admin_read
      path: /api/v1/admin/academic-verification/requests/:id
      methods:
        - GET
    - name: academic_verification:admin_reject
      path: /api/v1/admin/academic-verification/requests/:id/reject
      methods:
        - POST
    - name: academic_verification:admin_revoke
      path: /api/v1/admin/academic-verification/identities/:id/revoke
      methods:
        - POST
    - name: academic_verification:credentials
      path: /api/v1/academic-verification/credentials
      methods:
        - POST
      default_roles:
        - guest
        - member
    - name: academic_verification:read
      path: /api/v1/academic-verification
      methods:
        - GET
      default_roles:
        - guest
        - member
    - name: academic_verification:submit_card
      path: /api/v1/academic-verification/student-card
      methods:
        - POST
      default_roles:
        - guest
        - member
    - name: academic_verification:upload
      path: /api/v1/academic-verification/materials
      methods:
        - POST
      default_roles:
        - guest
        - member
operations:
    - operation_id: GetAcademicVerification
      method: GET
      path: /api/v1/academic-verification
      permission: academic_verification:read
      default_roles:
        - guest
        - member
      request_content: application/json
      summary: 查询本人教务认证状态
      responses:
        - status: 200
          kind: success
    - operation_id: VerifyAcademicCredentials
      method: POST
      path: /api/v1/academic-verification/credentials
      permission: academic_verification:credentials
      default_roles:
        - guest
        - member
      idempotency: required
      academic_verification: none
      request_content: application/json
      summary: 同步验证教务凭据
      headers:
        - name: Idempotency-Key
          type: string
          required: true
          max_length: 128
      body:
        fields:
            - name: student_no
              type: string
              required: true
              max_length: 64
            - name: password
              type: string
              required: true
              max_length: 256
      responses:
        - status: 200
          kind: success
        - status: 401
          kind: error
        - status: 429
          kind: error
        - status: 503
          kind: error
    - operation_id: UploadAcademicVerificationMaterial
      method: POST
      path: /api/v1/academic-verification/materials
      permission: academic_verification:upload
      default_roles:
        - guest
        - member
      idempotency: inherent
      academic_verification: none
      request_content: multipart/form-data
      summary: 上传单张学生证材料
      body:
        fields:
            - name: file
              type: string
              required: true
              format: binary
      responses:
        - status: 201
          kind: success
        - status: 400
          kind: error
        - status: 413
          kind: error
    - operation_id: SubmitStudentCardVerification
      method: POST
      path: /api/v1/academic-verification/student-card
      permission: academic_verification:submit_card
      default_roles:
        - guest
        - member
      idempotency: required
      academic_verification: none
      request_content: application/json
      summary: 提交学生证人工审核
      headers:
        - name: Idempotency-Key
          type: string
          required: true
          max_length: 128
      body:
        fields:
            - name: real_name
              type: string
              required: true
              max_length: 100
            - name: student_no
              type: string
              required: true
              max_length: 64
            - name: material_id
              type: integer
              required: true
              format: uint64
              minimum: 1
      responses:
        - status: 201
          kind: success
        - status: 409
          kind: error
    - operation_id: RevokeAcademicIdentity
      method: POST
      path: /api/v1/admin/academic-verification/identities/{id}/revoke
      permission: academic_verification:admin_revoke
      idempotency: required
      academic_verification: none
      request_content: application/json
      summary: 撤销已认证身份
      headers:
        - name: Idempotency-Key
          type: string
          required: true
          max_length: 128
      body:
        fields:
            - name: expected_version
              type: integer
              required: true
              format: uint64
              minimum: 1
            - name: reason
              type: string
              required: true
              max_length: 500
      responses:
        - status: 200
          kind: success
    - operation_id: GetAdminAcademicVerificationMaterial
      method: GET
      path: /api/v1/admin/academic-verification/materials/{id}
      permission: academic_verification:admin_material
      request_content: application/json
      summary: 受控读取认证材料
      responses:
        - status: 200
          kind: success
    - operation_id: ListAdminAcademicVerificationRequests
      method: GET
      path: /api/v1/admin/academic-verification/requests
      permission: academic_verification:admin_list
      request_content: application/json
      summary: 分页查询认证申请
      query:
        - name: status
          type: string
        - name: page
          type: integer
          format: int32
          minimum: 1
        - name: page_size
          type: integer
          format: int32
          minimum: 1
          maximum: 100
      responses:
        - status: 200
          kind: success
    - operation_id: GetAdminAcademicVerificationRequest
      method: GET
      path: /api/v1/admin/academic-verification/requests/{id}
      permission: academic_verification:admin_read
      request_content: application/json
      summary: 查询认证申请详情
      responses:
        - status: 200
          kind: success
    - operation_id: ApproveAcademicVerificationRequest
      method: POST
      path: /api/v1/admin/academic-verification/requests/{id}/approve
      permission: academic_verification:admin_approve
      idempotency: required
      academic_verification: none
      request_content: application/json
      summary: 批准认证申请
      headers:
        - name: Idempotency-Key
          type: string
          required: true
          max_length: 128
      body:
        fields:
            - name: expected_version
              type: integer
              required: true
              format: uint64
              minimum: 1
      responses:
        - status: 200
          kind: success
    - operation_id: RejectAcademicVerificationRequest
      method: POST
      path: /api/v1/admin/academic-verification/requests/{id}/reject
      permission: academic_verification:admin_reject
      idempotency: required
      academic_verification: none
      request_content: application/json
      summary: 驳回认证申请
      headers:
        - name: Idempotency-Key
          type: string
          required: true
          max_length: 128
      body:
        fields:
            - name: expected_version
              type: integer
              required: true
              format: uint64
              minimum: 1
            - name: reason
              type: string
              required: true
              max_length: 500
      responses:
        - status: 200
          kind: success
