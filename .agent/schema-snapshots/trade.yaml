version: 2
module: trade
entity:
    name: Order
    table: trade_orders
    primary: true
    fields:
        - name: order_no
          type: string
          required: true
          size: 40
          unique: true
        - name: order_type
          type: string
          required: true
          size: 32
          index: true
        - name: resource_type
          type: string
          required: true
          size: 64
        - name: resource_id
          type: uint64
          required: true
        - name: buyer_id
          type: uint64
          required: true
          index: true
        - name: seller_id
          type: uint64
          required: true
          index: true
        - name: amount_cents
          type: int64
          required: true
        - name: currency
          type: string
          required: true
          size: 3
        - name: payment_mode
          type: string
          required: true
          size: 16
        - name: trade_status
          type: string
          required: true
          size: 24
          index: true
        - name: fulfillment_status
          type: string
          required: true
          size: 24
        - name: title_snapshot
          type: string
          required: true
          size: 200
        - name: resource_snapshot
          type: json
          required: true
        - name: idempotency_key
          type: string
          required: true
          size: 128
        - name: expires_at
          type: datetime
          required: false
          index: true
        - name: paid_at
          type: datetime
          required: false
        - name: completed_at
          type: datetime
          required: false
        - name: cancelled_at
          type: datetime
          required: false
        - name: closed_at
          type: datetime
          required: false
        - name: version
          type: uint64
          required: true
    indexes:
        - name: uk_trade_buyer_idempotency
          fields:
            - buyer_id
            - idempotency_key
          unique: true
        - name: idx_trade_resource
          fields:
            - resource_type
            - resource_id
        - name: idx_trade_expiry
          fields:
            - trade_status
            - expires_at
entities:
    - name: Order
      table: trade_orders
      primary: true
      fields:
        - name: order_no
          type: string
          required: true
          size: 40
          unique: true
        - name: order_type
          type: string
          required: true
          size: 32
          index: true
        - name: resource_type
          type: string
          required: true
          size: 64
        - name: resource_id
          type: uint64
          required: true
        - name: buyer_id
          type: uint64
          required: true
          index: true
        - name: seller_id
          type: uint64
          required: true
          index: true
        - name: amount_cents
          type: int64
          required: true
        - name: currency
          type: string
          required: true
          size: 3
        - name: payment_mode
          type: string
          required: true
          size: 16
        - name: trade_status
          type: string
          required: true
          size: 24
          index: true
        - name: fulfillment_status
          type: string
          required: true
          size: 24
        - name: title_snapshot
          type: string
          required: true
          size: 200
        - name: resource_snapshot
          type: json
          required: true
        - name: idempotency_key
          type: string
          required: true
          size: 128
        - name: expires_at
          type: datetime
          required: false
          index: true
        - name: paid_at
          type: datetime
          required: false
        - name: completed_at
          type: datetime
          required: false
        - name: cancelled_at
          type: datetime
          required: false
        - name: closed_at
          type: datetime
          required: false
        - name: version
          type: uint64
          required: true
      indexes:
        - name: uk_trade_buyer_idempotency
          fields:
            - buyer_id
            - idempotency_key
          unique: true
        - name: idx_trade_resource
          fields:
            - resource_type
            - resource_id
        - name: idx_trade_expiry
          fields:
            - trade_status
            - expires_at
    - name: OrderTransition
      table: trade_order_transitions
      fields:
        - name: order_id
          type: uint64
          required: true
        - name: from_status
          type: string
          required: true
          size: 24
        - name: to_status
          type: string
          required: true
          size: 24
        - name: actor_type
          type: string
          required: true
          size: 16
        - name: actor_id
          type: uint64
          required: false
        - name: reason_code
          type: string
          required: false
          size: 64
        - name: reason_text
          type: string
          required: false
          size: 500
        - name: idempotency_key
          type: string
          required: true
          size: 128
          unique: true
      indexes:
        - name: idx_trade_transition_order
          fields:
            - order_id
      foreign_keys:
        - field: order_id
          references: trade_orders.id
          on_delete: CASCADE
crud:
    - create
    - get
    - list
    - update
permissions:
    - name: trade:cancel
      path: /api/v1/orders/:id/cancel
      methods:
        - POST
    - name: trade:complete
      path: /api/v1/orders/:id/complete
      methods:
        - POST
    - name: trade:read
      path: /api/v1/orders
      methods:
        - GET
    - name: trade:read_item
      path: /api/v1/orders/:id
      methods:
        - GET
operations:
    - operation_id: ListMyTradeOrders
      method: GET
      path: /api/v1/orders
      permission: trade:read
      summary: 查询我的交易订单
      query:
        - name: page
          type: integer
          format: int32
          minimum: 1
        - name: page_size
          type: integer
          format: int32
          minimum: 1
          maximum: 100
      responses:
        - status: 200
          kind: success
    - operation_id: GetMyTradeOrder
      method: GET
      path: /api/v1/orders/{id}
      permission: trade:read_item
      summary: 查询交易订单详情
      responses:
        - status: 200
          kind: success
        - status: 404
          kind: error
    - operation_id: CancelTradeOrder
      method: POST
      path: /api/v1/orders/{id}/cancel
      permission: trade:cancel
      idempotency: required
      summary: 取消交易订单
      headers:
        - name: Idempotency-Key
          type: string
          required: true
          max_length: 128
      body:
        fields:
            - name: expected_version
              type: integer
              required: true
              format: uint64
              minimum: 1
      responses:
        - status: 200
          kind: success
        - status: 409
          kind: error
    - operation_id: CompleteTradeOrder
      method: POST
      path: /api/v1/orders/{id}/complete
      permission: trade:complete
      idempotency: required
      summary: 确认交易完成
      headers:
        - name: Idempotency-Key
          type: string
          required: true
          max_length: 128
      body:
        fields:
            - name: expected_version
              type: integer
              required: true
              format: uint64
              minimum: 1
      responses:
        - status: 200
          kind: success
        - status: 409
          kind: error
