version: 2
module: errand
entities:
  - name: Task
    table: errand_tasks
    primary: true
    fields:
      - {name: title, type: string, size: 200, required: true}
      - {name: description, type: text, required: true}
      - {name: reward_cents, type: int64, required: true}
      - {name: currency, type: string, size: 3, required: true}
      - {name: pickup_location, type: string, size: 500, required: true}
      - {name: dropoff_location, type: string, size: 500, required: true}
      - {name: deadline, type: datetime, required: true, index: true}
      - {name: status, type: string, size: 24, required: true, index: true}
      - {name: review_status, type: string, size: 24, required: true, index: true}
      - {name: review_reason, type: string, size: 500}
      - {name: reviewed_by, type: uint64}
      - {name: reviewed_at, type: datetime}
      - {name: requester_id, type: uint64, required: true, index: true}
      - {name: contact_type, type: string, size: 16, required: true}
      - {name: contact_ciphertext, type: string, size: 4096, required: true}
      - {name: runner_id, type: uint64, index: true}
      - {name: trade_order_id, type: uint64, unique: true}
      - {name: accepted_at, type: datetime}
      - {name: picked_up_at, type: datetime}
      - {name: delivered_at, type: datetime}
      - {name: completed_at, type: datetime}
      - {name: cancelled_at, type: datetime}
      - {name: version, type: uint64, required: true}
    indexes:
      - {name: idx_errand_open_deadline, fields: [status, deadline]}
  - name: Transition
    table: errand_transitions
    fields:
      - {name: task_id, type: uint64, required: true}
      - {name: from_status, type: string, size: 24, required: true}
      - {name: to_status, type: string, size: 24, required: true}
      - {name: actor_id, type: uint64}
      - {name: reason, type: string, size: 500}
      - {name: idempotency_key, type: string, size: 128, required: true, unique: true}
    indexes:
      - {name: idx_errand_transition_task, fields: [task_id]}
    foreign_keys:
      - {field: task_id, references: errand_tasks.id, on_delete: CASCADE}
crud: [create, get, list, update]
components:
  responses:
    ErrandResponse:
      description: 跑腿任务
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrandResponseBody"}}}
    ErrandPageResponse:
      description: 跑腿任务分页
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrandPageResponseBody"}}}
    ErrandOrderResponse:
      description: 跑腿任务及必有交易订单
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrandOrderResponseBody"}}}
    ErrandOptionalOrderResponse:
      description: 跑腿任务及可能存在的交易订单
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrandOptionalOrderResponseBody"}}}
  schemas:
    ErrandViewerAction:
      type: string
      enum: [edit, submit_review, accept, pickup, deliver, complete, cancel, verify_academic]
    ErrandView:
      type: object
      required: [id, title, description, reward_cents, currency, pickup_location, dropoff_location, deadline, status, review_status, review_reason, reviewed_by, reviewed_at, requester_id, contact_type, contact, runner_id, trade_order_id, accepted_at, picked_up_at, delivered_at, completed_at, cancelled_at, version, created_at, updated_at, viewer_relation, available_actions]
      properties:
        id: {type: integer, format: uint64}
        title: {type: string}
        description: {type: string}
        reward_cents: {type: integer, format: int64}
        currency: {type: string}
        pickup_location: {type: string}
        dropoff_location: {type: string}
        deadline: {type: string, format: date-time}
        status: {type: string}
        review_status: {type: string}
        review_reason: {type: string, nullable: true}
        reviewed_by: {type: integer, format: uint64, nullable: true}
        reviewed_at: {type: string, format: date-time, nullable: true}
        requester_id: {type: integer, format: uint64}
        contact_type: {type: string}
        contact: {type: string}
        runner_id: {type: integer, format: uint64, nullable: true}
        trade_order_id: {type: integer, format: uint64, nullable: true}
        accepted_at: {type: string, format: date-time, nullable: true}
        picked_up_at: {type: string, format: date-time, nullable: true}
        delivered_at: {type: string, format: date-time, nullable: true}
        completed_at: {type: string, format: date-time, nullable: true}
        cancelled_at: {type: string, format: date-time, nullable: true}
        version: {type: integer, format: uint64}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        viewer_relation: {type: string}
        available_actions: {type: array, items: {$ref: "#/components/schemas/ErrandViewerAction"}}
    ErrandViewPage:
      type: object
      required: [items, page, page_size, total]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/ErrandView"}}
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1, maximum: 100}
        total: {type: integer, format: int64}
    ErrandTradeOrder:
      type: object
      required: [id, order_no, order_type, resource_type, resource_id, buyer_id, seller_id, amount_cents, currency, payment_mode, trade_status, fulfillment_status, title_snapshot, resource_snapshot, expires_at, completed_at, cancelled_at, version, created_at, updated_at]
      properties:
        id: {type: integer, format: uint64}
        order_no: {type: string}
        order_type: {type: string}
        resource_type: {type: string}
        resource_id: {type: integer, format: uint64}
        buyer_id: {type: integer, format: uint64}
        seller_id: {type: integer, format: uint64}
        amount_cents: {type: integer, format: int64}
        currency: {type: string}
        payment_mode: {type: string}
        trade_status: {type: string}
        fulfillment_status: {type: string}
        title_snapshot: {type: string}
        resource_snapshot: {type: object, additionalProperties: true}
        expires_at: {type: string, format: date-time, nullable: true}
        completed_at: {type: string, format: date-time, nullable: true}
        cancelled_at: {type: string, format: date-time, nullable: true}
        version: {type: integer, format: uint64}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    ErrandOrderResult:
      type: object
      required: [errand, order]
      properties:
        errand: {$ref: "#/components/schemas/ErrandView"}
        order: {$ref: "#/components/schemas/ErrandTradeOrder"}
    ErrandOptionalOrderResult:
      type: object
      required: [errand]
      properties:
        errand: {$ref: "#/components/schemas/ErrandView"}
        order: {$ref: "#/components/schemas/ErrandTradeOrder"}
    ErrandResponseBody:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/ErrandView"}, request_id: {type: string}}
    ErrandPageResponseBody:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/ErrandViewPage"}, request_id: {type: string}}
    ErrandOrderResponseBody:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/ErrandOrderResult"}, request_id: {type: string}}
    ErrandOptionalOrderResponseBody:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/ErrandOptionalOrderResult"}, request_id: {type: string}}
operations:
  - operation_id: ListErrands
    default_roles: [guest, member]
    method: GET
    path: /api/v1/errands
    permission: errand:read
    summary: 浏览待接跑腿任务
    query:
      - {name: page, type: integer, format: int32, minimum: 1}
      - {name: page_size, type: integer, format: int32, minimum: 1, maximum: 100}
    responses: [{status: 200, kind: success, ref: ErrandPageResponse}]
  - operation_id: ListMyErrands
    default_roles: [member]
    method: GET
    path: /api/v1/errands/mine
    permission: errand:read_mine
    summary: 查询我的跑腿任务
    query:
      - {name: relation, type: string, enum: [all, published, accepted]}
      - {name: status, type: string, enum: [open, accepted, picked_up, delivered, completed, cancelled]}
      - {name: review_status, type: string, enum: [draft, pending_review, approved, rejected]}
      - {name: page, type: integer, format: int32, minimum: 1}
      - {name: page_size, type: integer, format: int32, minimum: 1, maximum: 100}
    responses: [{status: 200, kind: success, ref: ErrandPageResponse}]
  - operation_id: CreateErrand
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/errands
    permission: errand:create
    summary: 发布跑腿任务
    body:
      fields:
        - {name: title, type: string, required: true}
        - {name: description, type: string, required: true}
        - {name: reward_cents, type: integer, format: int64, required: true, minimum: 1}
        - {name: pickup_location, type: string, required: true}
        - {name: dropoff_location, type: string, required: true}
        - {name: deadline, type: string, format: date-time, required: true}
        - {name: contact_type, type: string, required: true}
        - {name: contact, type: string, required: true}
    responses: [{status: 201, kind: success, ref: ErrandResponse}, {status: 400, kind: error}]
  - operation_id: GetErrand
    default_roles: [guest, member]
    method: GET
    path: /api/v1/errands/{id}
    permission: errand:read_item
    summary: 查询跑腿任务详情
    responses: [{status: 200, kind: success, ref: ErrandResponse}, {status: 404, kind: error}]
  - operation_id: ListAdminErrands
    method: GET
    path: /api/v1/admin/errands
    permission: errand:admin_read
    summary: 管理端查询跑腿任务
    query:
      - {name: status, type: string}
      - {name: review_status, type: string}
      - {name: keyword, type: string}
      - {name: page, type: integer, format: int32, minimum: 1}
      - {name: page_size, type: integer, format: int32, minimum: 1, maximum: 100}
    responses: [{status: 200, kind: success, ref: ErrandPageResponse}]
  - operation_id: UpdateErrand
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: PATCH
    idempotency: required
    academic_verification: required
    path: /api/v1/errands/{id}
    permission: errand:update
    summary: 修改未接单的跑腿任务
    body:
      fields:
        - {name: title, type: string, required: true}
        - {name: description, type: string, required: true}
        - {name: reward_cents, type: integer, format: int64, required: true, minimum: 1}
        - {name: pickup_location, type: string, required: true}
        - {name: dropoff_location, type: string, required: true}
        - {name: deadline, type: string, format: date-time, required: true}
        - {name: contact_type, type: string}
        - {name: contact, type: string}
        - {name: expected_version, type: integer, format: uint64, required: true, minimum: 1}
    responses: [{status: 200, kind: success, ref: ErrandResponse}, {status: 409, kind: error}]
  - operation_id: AcceptErrand
    default_roles: [member]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/errands/{id}/accept
    permission: errand:accept
    summary: 原子接单并创建交易订单
    headers: [{name: Idempotency-Key, type: string, required: true}]
    body: {fields: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]}
    responses: [{status: 201, kind: success, ref: ErrandOrderResponse}, {status: 409, kind: error}]
  - operation_id: SubmitErrandReview
    default_roles: [member]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/errands/{id}/submit-review
    permission: errand:submit_review
    summary: 重新提交跑腿任务审核
    headers: [{name: Idempotency-Key, type: string, required: true}]
    body: {fields: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]}
    responses: [{status: 200, kind: success, ref: ErrandResponse}, {status: 409, kind: error}]
  - operation_id: ReviewErrand
    method: POST
    idempotency: required
    academic_verification: none
    path: /api/v1/admin/errands/{id}/review
    permission: errand:review
    summary: 审核跑腿任务
    headers: [{name: Idempotency-Key, type: string, required: true}]
    body:
      fields:
        - {name: expected_version, type: integer, format: uint64, required: true, minimum: 1}
        - {name: approved, type: boolean, required: true}
        - {name: reason, type: string, max_length: 500}
    responses: [{status: 200, kind: success, ref: ErrandResponse}, {status: 400, kind: error}, {status: 409, kind: error}]
  - operation_id: RevokeErrandReview
    method: POST
    idempotency: required
    academic_verification: none
    path: /api/v1/admin/errands/{id}/revoke-review
    permission: errand:review_revoke
    summary: 撤销跑腿任务审核结果
    headers: [{name: Idempotency-Key, type: string, required: true}]
    body:
      fields:
        - {name: expected_version, type: integer, format: uint64, required: true, minimum: 1}
        - {name: reason, type: string, required: true, max_length: 500}
    responses: [{status: 200, kind: success, ref: ErrandResponse}, {status: 400, kind: error}, {status: 409, kind: error}]
  - operation_id: PickupErrand
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/errands/{id}/pickup
    permission: errand:pickup
    summary: 跑腿员确认取件
    body: {fields: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]}
    responses: [{status: 200, kind: success, ref: ErrandResponse}, {status: 409, kind: error}]
  - operation_id: DeliverErrand
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/errands/{id}/deliver
    permission: errand:deliver
    summary: 跑腿员确认送达
    body: {fields: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]}
    responses: [{status: 200, kind: success, ref: ErrandResponse}, {status: 409, kind: error}]
  - operation_id: CompleteErrand
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/errands/{id}/complete
    permission: errand:complete
    summary: 发布者确认跑腿完成
    body: {fields: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]}
    responses: [{status: 200, kind: success, ref: ErrandOrderResponse}, {status: 409, kind: error}]
  - operation_id: CancelErrand
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/errands/{id}/cancel
    permission: errand:cancel
    summary: 取消跑腿任务
    body: {fields: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]}
    responses: [{status: 200, kind: success, ref: ErrandOptionalOrderResponse}, {status: 409, kind: error}]
