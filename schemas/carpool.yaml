version: 2
module: carpool
entities:
  - name: Trip
    table: carpool_trips
    primary: true
    fields:
      - {name: title, type: string, size: 200, required: true}
      - {name: origin, type: string, size: 500, required: true}
      - {name: destination, type: string, size: 500, required: true}
      - {name: departure_at, type: datetime, required: true, index: true}
      - {name: total_seats, type: int64, required: true}
      - {name: occupied_seats, type: int64, required: true}
      - {name: status, type: string, size: 24, required: true, index: true}
      - {name: review_status, type: string, size: 24, required: true, index: true}
      - {name: review_reason, type: string, size: 500}
      - {name: reviewed_by, type: uint64}
      - {name: reviewed_at, type: datetime}
      - {name: organizer_id, type: uint64, required: true, index: true}
      - {name: contact_type, type: string, size: 16, required: true}
      - {name: contact_ciphertext, type: text, required: true}
      - {name: version, type: uint64, required: true}
    indexes: [{name: idx_carpool_open_departure, fields: [status, departure_at]}]
  - name: Participant
    table: carpool_participants
    fields:
      - {name: trip_id, type: uint64, required: true}
      - {name: user_id, type: uint64, required: true}
      - {name: status, type: string, size: 16, required: true, index: true}
      - {name: joined_at, type: datetime, required: true}
      - {name: cancelled_at, type: datetime}
      - {name: version, type: uint64, required: true}
    indexes: [{name: uk_carpool_trip_user, fields: [trip_id, user_id], unique: true}]
    foreign_keys: [{field: trip_id, references: carpool_trips.id, on_delete: CASCADE}]
crud: [create, get, list, update]
components:
  responses:
    CarpoolTripResponse:
      description: 拼车行程
      content: {application/json: {schema: {$ref: "#/components/schemas/CarpoolTripResponseBody"}}}
    CarpoolTripPageResponse:
      description: 拼车行程分页
      content: {application/json: {schema: {$ref: "#/components/schemas/CarpoolTripPageResponseBody"}}}
  schemas:
    CarpoolViewerAction:
      type: string
      enum: [edit, submit_review, cancel, join, leave, verify_academic]
    CarpoolTripView:
      type: object
      required: [id, title, origin, destination, departure_at, total_seats, occupied_seats, status, review_status, review_reason, reviewed_by, reviewed_at, organizer_id, contact_type, contact, version, created_at, updated_at, viewer_relation, available_actions]
      properties:
        id: {type: integer, format: uint64}
        title: {type: string}
        origin: {type: string}
        destination: {type: string}
        departure_at: {type: string, format: date-time}
        total_seats: {type: integer, format: int64}
        occupied_seats: {type: integer, format: int64}
        status: {type: string}
        review_status: {type: string}
        review_reason: {type: string, nullable: true}
        reviewed_by: {type: integer, format: uint64, nullable: true}
        reviewed_at: {type: string, format: date-time, nullable: true}
        organizer_id: {type: integer, format: uint64}
        contact_type: {type: string}
        contact: {type: string}
        version: {type: integer, format: uint64}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        viewer_relation: {type: string}
        available_actions: {type: array, items: {$ref: "#/components/schemas/CarpoolViewerAction"}}
    CarpoolTripViewPage:
      type: object
      required: [items, page, page_size, total]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/CarpoolTripView"}}
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1, maximum: 100}
        total: {type: integer, format: int64}
    CarpoolTripResponseBody:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/CarpoolTripView"}, request_id: {type: string}}
    CarpoolTripPageResponseBody:
      type: object
      required: [data, request_id]
      properties: {data: {$ref: "#/components/schemas/CarpoolTripViewPage"}, request_id: {type: string}}
operations:
  - operation_id: ListMyCarpoolTrips
    default_roles: [member]
    method: GET
    path: /api/v1/carpool/trips/mine
    permission: carpool:read_mine
    summary: 查询我发布的拼车行程
    query:
      - {name: status, type: string}
      - {name: review_status, type: string}
      - {name: keyword, type: string}
      - {name: page, type: integer, format: int32, minimum: 1}
      - {name: page_size, type: integer, format: int32, minimum: 1, maximum: 100}
    responses: [{status: 200, kind: success, ref: CarpoolTripPageResponse}]
  - operation_id: ListCarpoolTrips
    default_roles: [guest, member]
    method: GET
    path: /api/v1/carpool/trips
    permission: carpool:read
    summary: 搜索开放拼车行程
    query:
      - {name: origin, type: string}
      - {name: destination, type: string}
      - {name: departure_date, type: string, format: date}
      - {name: seats_needed, type: integer, format: int64, minimum: 1}
      - {name: page, type: integer, format: int32, minimum: 1}
      - {name: page_size, type: integer, format: int32, minimum: 1, maximum: 100}
    responses: [{status: 200, kind: success, ref: CarpoolTripPageResponse}]
  - operation_id: CreateCarpoolTrip
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/carpool/trips
    permission: carpool:create
    summary: 发起拼车行程
    body: {fields: [{name: title, type: string, required: true, max_length: 200}, {name: origin, type: string, required: true, max_length: 500}, {name: destination, type: string, required: true, max_length: 500}, {name: departure_at, type: string, format: date-time, required: true}, {name: total_seats, type: integer, format: int64, required: true, minimum: 1}, {name: contact_type, type: string, required: true, max_length: 16}, {name: contact, type: string, required: true, max_length: 200}]}
    responses: [{status: 201, kind: success, ref: CarpoolTripResponse}]
  - operation_id: GetCarpoolTrip
    default_roles: [guest, member]
    method: GET
    path: /api/v1/carpool/trips/{id}
    permission: carpool:read_item
    summary: 查看拼车行程
    responses: [{status: 200, kind: success, ref: CarpoolTripResponse}]
  - operation_id: UpdateCarpoolTrip
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: PATCH
    idempotency: required
    academic_verification: required
    path: /api/v1/carpool/trips/{id}
    permission: carpool:update
    summary: 修改未成行的拼车行程
    body:
      fields:
        - {name: title, type: string, required: true, max_length: 200}
        - {name: origin, type: string, required: true, max_length: 500}
        - {name: destination, type: string, required: true, max_length: 500}
        - {name: departure_at, type: string, format: date-time, required: true}
        - {name: total_seats, type: integer, format: int64, required: true, minimum: 1}
        - {name: contact_type, type: string, max_length: 16}
        - {name: contact, type: string, max_length: 200}
        - {name: expected_version, type: integer, format: uint64, required: true, minimum: 1}
    responses: [{status: 200, kind: success, ref: CarpoolTripResponse}, {status: 409, kind: error}]
  - operation_id: ListAdminCarpoolTrips
    method: GET
    path: /api/v1/admin/carpool/trips
    permission: carpool:admin_read
    summary: 管理端查询拼车行程
    query:
      - {name: status, type: string}
      - {name: review_status, type: string}
      - {name: keyword, type: string}
      - {name: page, type: integer, format: int32, minimum: 1}
      - {name: page_size, type: integer, format: int32, minimum: 1, maximum: 100}
    responses: [{status: 200, kind: success, ref: CarpoolTripPageResponse}]
  - operation_id: JoinCarpoolTrip
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/carpool/trips/{id}/join
    permission: carpool:join
    summary: 原子加入拼车行程
    body: {fields: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]}
    responses: [{status: 200, kind: success, ref: CarpoolTripResponse}, {status: 409, kind: error}]
  - operation_id: SubmitCarpoolTripReview
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/carpool/trips/{id}/submit-review
    permission: carpool:submit_review
    summary: 重新提交拼车行程审核
    body: {fields: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]}
    responses: [{status: 200, kind: success, ref: CarpoolTripResponse}, {status: 409, kind: error}]
  - operation_id: ReviewCarpoolTrip
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: none
    path: /api/v1/admin/carpool/trips/{id}/review
    permission: carpool:review
    summary: 审核拼车行程
    body:
      fields:
        - {name: expected_version, type: integer, format: uint64, required: true, minimum: 1}
        - {name: approved, type: boolean, required: true}
        - {name: reason, type: string, max_length: 500}
    responses: [{status: 200, kind: success, ref: CarpoolTripResponse}, {status: 400, kind: error}, {status: 409, kind: error}]
  - operation_id: RevokeCarpoolTripReview
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: none
    path: /api/v1/admin/carpool/trips/{id}/revoke-review
    permission: carpool:review_revoke
    summary: 撤销拼车行程审核结果
    body:
      fields:
        - {name: expected_version, type: integer, format: uint64, required: true, minimum: 1}
        - {name: reason, type: string, required: true, max_length: 500}
    responses: [{status: 200, kind: success, ref: CarpoolTripResponse}, {status: 400, kind: error}, {status: 409, kind: error}]
  - operation_id: LeaveCarpoolTrip
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/carpool/trips/{id}/leave
    permission: carpool:leave
    summary: 退出拼车行程
    body: {fields: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]}
    responses: [{status: 200, kind: success, ref: CarpoolTripResponse}]
  - operation_id: CancelCarpoolTrip
    default_roles: [member]
    headers: [{name: Idempotency-Key, type: string, required: true}]
    method: POST
    idempotency: required
    academic_verification: required
    path: /api/v1/carpool/trips/{id}/cancel
    permission: carpool:cancel
    summary: 取消拼车行程
    body: {fields: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]}
    responses: [{status: 200, kind: success, ref: CarpoolTripResponse}]
