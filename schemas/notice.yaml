version: 2
module: notice
entities:
  - name: Notice
    table: notices
    primary: true
    fields:
      - {name: title, type: string, size: 200, required: true}
      - {name: summary, type: string, size: 500, required: true}
      - {name: body, type: text, required: true}
      - {name: category, type: string, size: 64, required: true, index: true}
      - {name: priority, type: string, size: 16, required: true}
      - {name: status, type: string, size: 16, required: true, index: true}
      - {name: action_path, type: string, size: 512}
      - {name: push_enabled, type: bool, required: true}
      - {name: publish_at, type: datetime, index: true}
      - {name: published_at, type: datetime}
      - {name: revoked_at, type: datetime}
      - {name: version, type: uint64, required: true}
      - {name: created_by, type: uint64, required: true}
      - {name: updated_by, type: uint64, required: true}
      - {name: source_event_id, type: uint64, unique: true}
  - name: NoticeAudience
    table: notice_audiences
    fields:
      - {name: notice_id, type: uint64, required: true}
      - {name: audience_type, type: string, size: 16, required: true}
      - {name: audience_value, type: string, size: 64, required: true}
    indexes:
      - {name: uk_notice_audience, fields: [notice_id, audience_type, audience_value], unique: true}
    foreign_keys:
      - {field: notice_id, references: notices.id, on_delete: CASCADE}
  - name: NoticeRecipient
    table: notice_recipients
    fields:
      - {name: notice_id, type: uint64, required: true}
      - {name: user_id, type: uint64, required: true}
      - {name: read_at, type: datetime}
    indexes:
      - {name: uk_notice_recipient, fields: [notice_id, user_id], unique: true}
      - {name: idx_recipient_inbox, fields: [user_id, read_at, notice_id]}
    foreign_keys:
      - {field: notice_id, references: notices.id, on_delete: CASCADE}
  - name: NoticeDelivery
    table: notice_deliveries
    fields:
      - {name: notice_id, type: uint64, required: true}
      - {name: user_id, type: uint64, required: true}
      - {name: channel, type: string, size: 16, required: true}
      - {name: status, type: string, size: 16, required: true, index: true}
      - {name: attempts, type: int64, required: true}
      - {name: locked_at, type: datetime}
      - {name: idempotency_key, type: string, size: 128, required: true, unique: true}
      - {name: provider_message_id, type: string, size: 128}
      - {name: last_error, type: string, size: 1000}
    indexes:
      - {name: idx_delivery_notice, fields: [notice_id, status]}
      - {name: idx_delivery_lease, fields: [status, locked_at]}
    foreign_keys:
      - {field: notice_id, references: notices.id, on_delete: CASCADE}
  - name: OutboxEvent
    table: outbox_events
    fields:
      - {name: aggregate_type, type: string, size: 64, required: true}
      - {name: aggregate_id, type: uint64, required: true}
      - {name: event_type, type: string, size: 64, required: true}
      - {name: payload, type: json, required: true}
      - {name: status, type: string, size: 16, required: true, index: true}
      - {name: available_at, type: datetime, required: true, index: true}
      - {name: locked_at, type: datetime}
      - {name: attempts, type: int64, required: true}
      - {name: last_error, type: string, size: 1000}
    indexes:
      - {name: idx_outbox_dispatch, fields: [status, available_at, locked_at]}
crud: [create, get, list, update, delete]
operations:
  - operation_id: ListAdminNotices
    method: GET
    path: /api/v1/admin/notices
    permission: notice:manage
    summary: 管理端查询通知
    query: &paging
      - {name: page, type: integer, format: int32, minimum: 1}
      - {name: page_size, type: integer, format: int32, minimum: 1, maximum: 100}
  - operation_id: CreateNotice
    method: POST
    idempotency: required
    path: /api/v1/admin/notices
    permission: notice:manage
    summary: 创建通知草稿
    body: {ref: CreateNoticeRequest}
    responses: [{status: 201, kind: success}]
  - operation_id: GetAdminNotice
    method: GET
    path: /api/v1/admin/notices/{id}
    permission: notice:manage_item
    summary: 查询通知详情
  - operation_id: UpdateNotice
    method: PATCH
    idempotency: required
    path: /api/v1/admin/notices/{id}
    permission: notice:manage_item
    summary: 更新通知草稿
    body: {ref: UpdateNoticeRequest}
  - operation_id: DeleteNotice
    method: DELETE
    idempotency: required
    path: /api/v1/admin/notices/{id}
    permission: notice:manage_item
    summary: 删除通知草稿
    query: [{name: expected_version, type: integer, format: uint64, required: true, minimum: 1}]
  - operation_id: PublishNotice
    method: POST
    idempotency: required
    path: /api/v1/admin/notices/{id}/publish
    permission: notice:publish
    summary: 发布通知
    body: {ref: PublishNoticeRequest}
  - operation_id: RevokeNotice
    method: POST
    idempotency: required
    path: /api/v1/admin/notices/{id}/revoke
    permission: notice:revoke
    summary: 撤回通知
    body: {ref: VersionRequest}
  - operation_id: ListNoticeDeliveries
    method: GET
    path: /api/v1/admin/notices/{id}/deliveries
    permission: notice:deliveries
    summary: 查询通知投递
    query: *paging
  - operation_id: RetryNoticeDeliveries
    method: POST
    idempotency: required
    path: /api/v1/admin/notices/{id}/deliveries/retry
    permission: notice:retry
    summary: 重试失败投递
  - operation_id: ListMyNotices
    default_roles: [member]
    method: GET
    path: /api/v1/notices
    permission: notice:read
    summary: 查询我的通知
    query:
      - {name: page, type: integer, format: int32, minimum: 1}
      - {name: page_size, type: integer, format: int32, minimum: 1, maximum: 100}
      - {name: unread, type: boolean}
      - {name: category, type: string}
  - operation_id: GetUnreadNoticeCount
    default_roles: [member]
    method: GET
    path: /api/v1/notices/unread-count
    permission: notice:unread
    summary: 查询未读数量
  - operation_id: ReadAllNotices
    default_roles: [member]
    method: PUT
    idempotency: inherent
    path: /api/v1/notices/read-all
    permission: notice:read_all
    summary: 全部标记已读
  - operation_id: GetMyNotice
    default_roles: [member]
    method: GET
    path: /api/v1/notices/{id}
    permission: notice:read_item
    summary: 查询我的通知详情
  - operation_id: ReadNotice
    default_roles: [member]
    method: PUT
    idempotency: inherent
    path: /api/v1/notices/{id}/read
    permission: notice:mark_read
    summary: 标记通知已读
